<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KAPCO PayPeople</title><style>body{margin:0;font-family:Arial;background:#f4f8fb;color:#14233a}.login{min-height:100vh;display:grid;place-items:center;background:linear-gradient(145deg,#071529,#0d3158,#0d7459);padding:20px}.card{background:white;border-radius:24px;padding:22px;box-shadow:0 20px 60px #0003;margin:12px}.logo{width:56px;height:56px;border-radius:18px;background:#0f9f6e;color:white;display:grid;place-items:center;font-size:24px;font-weight:900}.brand{display:flex;gap:12px;align-items:center}.inp{width:100%;padding:13px;border:1px solid #dfe7ef;border-radius:14px;margin:8px 0 12px}.btn{background:#0f9f6e;color:white;border:0;border-radius:14px;padding:12px 14px;font-weight:800}.btn2{background:#eef5fb;color:#08162a}.app{display:none}.top{background:#08162a;color:white;padding:16px;position:sticky;top:0}.tabs{display:flex;gap:8px;overflow:auto;background:white;padding:10px}.tabs button{border:0;border-radius:99px;padding:10px 12px;background:#eef5fb;font-weight:800}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px}.m b{font-size:24px}.muted{color:#75869a}.table{width:100%;border-collapse:collapse;font-size:13px}.table td,.table th{padding:10px;border-bottom:1px solid #e4ebf3;text-align:left}.badge{background:#eaf8f3;color:#0c7d59;border-radius:99px;padding:5px 8px;font-weight:800}.red{background:#fff1f1;color:#c82333}.amber{background:#fff7e6;color:#b96b00}@media(min-width:700px){.grid{grid-template-columns:repeat(4,1fr)}}</style></head><body><div id="login" class="login"><div class="card" style="max-width:420px;width:100%"><div class="brand"><div class="logo">K</div><div><h2>KAPCO PayPeople</h2><p class="muted">Offline HRMS demo APK</p></div></div><input id="e" class="inp" value="admin@kapco.com.pk"><input id="p" class="inp" type="password" value="K@pco123"><button class="btn" style="width:100%" onclick="go()">Login</button><p class="muted">Demo roles: Super Admin, HR, Manager, Accounts, Employee</p></div></div><div id="app" class="app"><div class="top"><div class="brand"><div class="logo">K</div><div><h2>KAPCO HRMS</h2><p style="margin:0;color:#b9c8da">PayPeople style testing app</p></div></div></div><div class="tabs"><button onclick="dash()">Dashboard</button><button onclick="emp()">Employees</button><button onclick="att()">Attendance</button><button onclick="leave()">Leaves</button><button onclick="pay()">Payroll</button><button onclick="rep()">Reports</button></div><div id="view"></div></div><script>var employees=[['KAP-001','Muhammad Asif','IT','Manager','350000'],['KAP-002','Anthony Rath','HR','Officer','280000'],['KAP-003','Ali Raza','Finance','Executive','210000'],['KAP-004','Sana Khan','Admin','Supervisor','160000'],['KAP-005','Bilal Ahmed','Operations','Technician','145000']];var attendance=[['KAP-001','Present','08:03','17:31'],['KAP-002','Late','08:22','17:40'],['KAP-003','Present','07:58','17:28'],['KAP-004','Leave','-','-'],['KAP-005','Absent','-','-']];function go(){login.style.display='none';app.style.display='block';dash()}function m(t,v){return '<div class="card m"><span class="muted">'+t+'</span><br><b>'+v+'</b></div>'}function dash(){view.innerHTML='<div class="grid">'+m('Total Employees',5)+m('Present Today',3)+m('Absent Today',1)+m('Pending Leaves',2)+m('This Month Payroll','PKR 1.14M')+m('Late Today',1)+m('On Leave',1)+m('Departments',7)+'</div><div class="card"><h3>Shift Timings</h3><p>General: Monday-Friday 8:00-5:30<br>Morning: 6-2 | Noon: 2-9 | Night: 9-6<br>Daily Basis: Monday-Sunday 8:00-5:30</p></div>'}function emp(){view.innerHTML='<div class="card"><h3>Employees</h3><table class="table"><tr><th>ID</th><th>Name</th><th>Dept</th><th>Designation</th><th>Salary</th></tr>'+employees.map(x=>'<tr><td>'+x[0]+'</td><td>'+x[1]+'</td><td>'+x[2]+'</td><td>'+x[3]+'</td><td>PKR '+x[4]+'</td></tr>').join('')+'</table></div>'}function att(){view.innerHTML='<div class="card"><h3>Attendance</h3><button class="btn">Check In</button> <button class="btn btn2">Check Out</button><table class="table"><tr><th>ID</th><th>Status</th><th>In</th><th>Out</th></tr>'+attendance.map(x=>'<tr><td>'+x[0]+'</td><td><span class="badge '+(x[1]=='Absent'?'red':x[1]=='Late'?'amber':'')+'">'+x[1]+'</span></td><td>'+x[2]+'</td><td>'+x[3]+'</td></tr>').join('')+'</table></div>'}function leave(){view.innerHTML='<div class="card"><h3>Leave Management</h3><p>Casual Leave: 20 | Sick Leave: 10 | Annual Leave: 20 | Short Leave | Half Day</p><button class="btn">Apply Leave</button><table class="table"><tr><th>Emp</th><th>Type</th><th>Flow</th></tr><tr><td>KAP-004</td><td>Casual</td><td>Employee to Manager to HR</td></tr></table></div>'}function pay(){view.innerHTML='<div class="card"><h3>Salary Slip</h3><p><b>KAP-001 Muhammad Asif</b><br>Basic Salary: PKR 350,000<br>House Rent: PKR 87,500<br>Medical: PKR 35,000<br>Fuel + Mobile: PKR 40,000<br>Deductions: PKR 12,000</p><h2 style="color:#0f9f6e">Net Payable: PKR 500,500</h2><button class="btn" onclick="print()">Download / Print PDF</button></div>'}function rep(){view.innerHTML='<div class="grid">'+m('Daily Attendance','Ready')+m('Monthly Attendance','Ready')+m('Late Report','Ready')+m('Absent Report','Ready')+m('Leave Report','Ready')+m('Payroll Report','Ready')+m('Employee Report','Ready')+m('Department Report','Ready')+'</div>'}</script></body></html>
